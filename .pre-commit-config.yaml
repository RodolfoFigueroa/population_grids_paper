repos:
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.11.18
  hooks:
  - id: uv-lock

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.10
  hooks:
  - id: ruff-check
    args: [--fix-only]
  - id: ruff-format

- repo: https://github.com/treeverse/dvc
  rev: 3.67.1
  hooks:
  - id: dvc-pre-commit
    additional_dependencies:
    - .[all]
    language_version: python3
    stages:
    - pre-commit
  - id: dvc-pre-push
    additional_dependencies:
    - .[all]
    language_version: python3
    stages:
    - pre-push
  - id: dvc-post-checkout
    additional_dependencies:
    - .[all]
    language_version: python3
    stages:
    - post-checkout
    always_run: true
